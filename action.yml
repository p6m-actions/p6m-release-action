name: "P6m Release Action"
description: "Tags and commits changes"
author: "Ali Samji <ali@ybor.ai>"

# Define the inputs for this action
inputs:
  tags:
    description: Newline-separated list of tags to create
    required: true
  commit_message:
    description: Commit message for the changes
    required: false
    default: "[skip ci] Bump version for next release."
  files:
    description: Newline-separated list of untracked files to stage for the commit. All unstaged changes (including these files) will be committed.
    required: false
    default: ""

# Define the outputs for this action
outputs:
  new_sha:
    description: The SHA of the new commit created
    value: ${{ steps.release.outputs.new_sha }}

# Define the runs configuration
runs:
  using: "composite"
  steps:
    - name: Token Exchange
      uses: p6m-actions/token-exchange@v2

    - name: Release Version
      id: release
      shell: bash
      run: |
        ARGS=(--message '${{ inputs.commit_message }}')
        for tag in ${{ inputs.tags }}; do
          ARGS+=(--tag "$tag")
        done
        while IFS= read -r file; do
          [[ -n "$file" ]] && ARGS+=(--file "$file")
        done <<< '${{ inputs.files }}'
        delay=5
        attempt=1
        max_attempts=7
        # Will retry 6 times (7 total attempts including the initial attempt) with exponential backoff.
        until ${{ github.action_path }}/tag_and_commit.sh "${ARGS[@]}"; do
          if [ $attempt -ge $max_attempts ]; then
            echo "::error::Release failed after $max_attempts attempts. Giving up."
            exit 1
          fi
          echo "::warning::Attempt $attempt/$max_attempts failed. Retrying in ${delay}s..."
          sleep $delay
          delay=$(($delay * 2))
          attempt=$(($attempt + 1))
        done
        echo "::notice::Release succeeded on attempt $attempt/$max_attempts."

# Define the branding for the action in the GitHub Marketplace
branding:
  icon: "award"
  color: "blue"
